```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>2048-大宇烟花版</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
overflow:hidden;
touch-action:none;
background:#faf8ef;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:min(95vw,500px);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.title{
font-size:52px;
font-weight:bold;
color:#776e65;
}

.panel{
display:flex;
gap:10px;
}

.scoreBox{
background:#bbada0;
color:#fff;
padding:10px 15px;
border-radius:8px;
text-align:center;
min-width:90px;
}

.scoreBox .label{
font-size:12px;
}

.scoreBox .value{
font-size:22px;
font-weight:bold;
}

.controls{
margin-bottom:15px;
}

button{
border:none;
background:#8f7a66;
color:#fff;
padding:10px 18px;
border-radius:6px;
font-size:16px;
}

.board{
background:#bbada0;
padding:10px;
border-radius:10px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
touch-action:none;
}

.cell{
aspect-ratio:1;
display:flex;
justify-content:center;
align-items:center;
border-radius:8px;
font-size:clamp(20px,6vw,36px);
font-weight:bold;
transition:.12s;
}

.msg{
margin-top:15px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#776e65;
}

/* 烟花 */

.firework{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
z-index:99999;
}

@keyframes explode{
from{
transform:translate(0,0) scale(1);
opacity:1;
}
to{
transform:translate(var(--dx),var(--dy)) scale(0);
opacity:0;
}
}
</style>
</head>
<body>

<div class="container">

<div class="header">

<div class="title">2048</div>

<div class="panel">

<div class="scoreBox">
<div class="label">分数</div>
<div class="value" id="score">0</div>
</div>

<div class="scoreBox">
<div class="label">最高分</div>
<div class="value" id="best">0</div>
</div>

</div>
</div>

<div class="controls">
<button onclick="newGame()">重新开始</button>
</div>

<div id="board" class="board"></div>

<div id="msg" class="msg"></div>

</div>

<script>

const SIZE=4;

let board=[];
let score=0;
let best=parseInt(localStorage.getItem("best2048")||0);

const boardEl=document.getElementById("board");

const colors={
0:"#cdc1b4",
2:"#eee4da",
4:"#ede0c8",
8:"#f2b179",
16:"#f59563",
32:"#f67c5f",
64:"#f65e3b",
128:"#edcf72",
256:"#edcc61",
512:"#edc850",
1024:"#edc53f",
2048:"#edc22e"
};

function firework(x,y){

const palette=[
"#ff4d4f",
"#faad14",
"#52c41a",
"#1890ff",
"#722ed1",
"#eb2f96"
];

for(let i=0;i<25;i++){

const p=document.createElement("div");

p.className="firework";

p.style.left=x+"px";
p.style.top=y+"px";

p.style.background=
palette[Math.floor(Math.random()*palette.length)];

const angle=Math.random()*Math.PI*2;
const distance=50+Math.random()*100;

const dx=Math.cos(angle)*distance;
const dy=Math.sin(angle)*distance;

p.style.setProperty("--dx",dx+"px");
p.style.setProperty("--dy",dy+"px");

p.style.animation="explode 700ms ease-out forwards";

document.body.appendChild(p);

p.addEventListener("animationend",()=>{
p.remove();
});

}
}

function newGame(){

board=Array(SIZE)
.fill()
.map(()=>Array(SIZE).fill(0));

score=0;

document.getElementById("msg").innerText="";

spawn();
spawn();

render();
}

function spawn(){

let empty=[];

for(let r=0;r<SIZE;r++){
for(let c=0;c<SIZE;c++){

if(board[r][c]===0){
empty.push([r,c]);
}

}
}

if(empty.length===0)return;

const [r,c]=
empty[Math.floor(Math.random()*empty.length)];

board[r][c]=Math.random()<0.9?2:4;
}

function render(){

boardEl.innerHTML="";

for(let r=0;r<SIZE;r++){
for(let c=0;c<SIZE;c++){

const v=board[r][c];

const cell=document.createElement("div");

cell.className="cell";

cell.style.background=
colors[v]||"#3c3a32";

cell.style.color=
v>=8?"#fff":"#776e65";

cell.textContent=v===0?"":v;

boardEl.appendChild(cell);

}
}

scoreEl.textContent=score;
bestEl.textContent=best;
}

function slide(row){

let arr=row.filter(v=>v);

for(let i=0;i<arr.length-1;i++){

if(arr[i]===arr[i+1]){

arr[i]*=2;

score+=arr[i];

arr[i+1]=0;

const rect=boardEl.getBoundingClientRect();

firework(
rect.left+rect.width/2,
rect.top+rect.height/2
);

if(arr[i]===2048){
msg.innerText="🎉 达到2048！";
}

if(navigator.vibrate){
navigator.vibrate(30);
}
}
}

arr=arr.filter(v=>v);

while(arr.length<SIZE){
arr.push(0);
}

return arr;
}

function rotate(){

let next=
Array(SIZE)
.fill()
.map(()=>Array(SIZE).fill(0));

for(let r=0;r<SIZE;r++){
for(let c=0;c<SIZE;c++){
next[c][SIZE-1-r]=board[r][c];
}
}

board=next;
}

function moveLeft(){

let changed=false;

for(let r=0;r<SIZE;r++){

const old=board[r].join(",");

board[r]=slide(board[r]);

if(old!==board[r].join(",")){
changed=true;
}
}

return changed;
}

function move(dir){

let changed=false;

switch(dir){

case "left":
changed=moveLeft();
break;

case "right":
board=board.map(r=>r.reverse());
changed=moveLeft();
board=board.map(r=>r.reverse());
break;

case "up":
rotate();
rotate();
rotate();
changed=moveLeft();
rotate();
break;

case "down":
rotate();
changed=moveLeft();
rotate();
rotate();
rotate();
break;
}

if(changed){

spawn();

if(score>best){

best=score;

localStorage.setItem(
"best2048",
best
);
}

render();

if(gameOver()){

msg.innerText="😢 游戏结束";
}
}
}

function gameOver(){

for(let r=0;r<SIZE;r++){
for(let c=0;c<SIZE;c++){

if(board[r][c]===0)
return false;

if(c<3&&board[r][c]===board[r][c+1])
return false;

if(r<3&&board[r][c]===board[r+1][c])
return false;
}
}

return true;
}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") move("left");
if(e.key==="ArrowRight") move("right");
if(e.key==="ArrowUp") move("up");
if(e.key==="ArrowDown") move("down");

});

let startX=0;
let startY=0;

boardEl.addEventListener("pointerdown",e=>{

startX=e.clientX;
startY=e.clientY;

});

boardEl.addEventListener("pointerup",e=>{

const dx=e.clientX-startX;
const dy=e.clientY-startY;

const threshold=25;

if(Math.abs(dx)>Math.abs(dy)){

if(dx>threshold) move("right");
if(dx<-threshold) move("left");

}else{

if(dy>threshold) move("down");
if(dy<-threshold) move("up");

}

});

boardEl.addEventListener(
"touchmove",
e=>e.preventDefault(),
{passive:false}
);

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const msg=document.getElementById("msg");

newGame();

</script>

</body>
</html>
```
