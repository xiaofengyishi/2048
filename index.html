<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048小游戏</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#faf8ef;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
}

h1{
    color:#776e65;
    margin-bottom:10px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.score{
    background:#bbada0;
    color:white;
    padding:10px 20px;
    border-radius:6px;
    font-weight:bold;
}

button{
    border:none;
    background:#8f7a66;
    color:white;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.board{
    background:#bbada0;
    padding:10px;
    border-radius:10px;
    display:grid;
    grid-template-columns:repeat(4,80px);
    grid-template-rows:repeat(4,80px);
    gap:10px;
}

.cell{
    width:80px;
    height:80px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    background:#cdc1b4;
    color:#776e65;
}

.msg{
    margin-top:15px;
    color:red;
    font-size:20px;
    font-weight:bold;
}

@media(max-width:500px){
    .board{
        grid-template-columns:repeat(4,65px);
        grid-template-rows:repeat(4,65px);
    }

    .cell{
        width:65px;
        height:65px;
        font-size:22px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>2048</h1>

    <div class="top">
        <div class="score">
            分数: <span id="score">0</span>
        </div>

        <button onclick="initGame()">重新开始</button>
    </div>

    <div id="board" class="board"></div>

    <div id="msg" class="msg"></div>
</div>

<script>

let board = [];
let score = 0;

const colors = {
    0:"#cdc1b4",
    2:"#eee4da",
    4:"#ede0c8",
    8:"#f2b179",
    16:"#f59563",
    32:"#f67c5f",
    64:"#f65e3b",
    128:"#edcf72",
    256:"#edcc61",
    512:"#edc850",
    1024:"#edc53f",
    2048:"#edc22e"
};

function initGame(){
    board = Array(4).fill().map(()=>Array(4).fill(0));
    score = 0;
    document.getElementById("msg").innerText="";
    addRandom();
    addRandom();
    render();
}

function addRandom(){
    let empty=[];

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            if(board[r][c]===0){
                empty.push([r,c]);
            }
        }
    }

    if(empty.length===0) return;

    const [r,c]=empty[Math.floor(Math.random()*empty.length)];
    board[r][c]=Math.random()<0.9?2:4;
}

function render(){
    const boardDiv=document.getElementById("board");
    boardDiv.innerHTML="";

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){

            const value=board[r][c];

            const cell=document.createElement("div");
            cell.className="cell";
            cell.style.background=colors[value]||"#3c3a32";

            if(value>4){
                cell.style.color="#fff";
            }

            cell.innerText=value===0?"":value;

            boardDiv.appendChild(cell);
        }
    }

    document.getElementById("score").innerText=score;
}

function slide(row){

    row=row.filter(v=>v);

    for(let i=0;i<row.length-1;i++){
        if(row[i]===row[i+1]){
            row[i]*=2;
            score+=row[i];
            row[i+1]=0;
        }
    }

    row=row.filter(v=>v);

    while(row.length<4){
        row.push(0);
    }

    return row;
}

function rotateClockwise(mat){

    const newMat=Array(4).fill().map(()=>Array(4).fill(0));

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            newMat[c][3-r]=mat[r][c];
        }
    }

    return newMat;
}

function moveLeft(){

    let changed=false;

    for(let r=0;r<4;r++){

        const old=[...board[r]];

        board[r]=slide(board[r]);

        if(old.join()!=board[r].join()){
            changed=true;
        }
    }

    return changed;
}

function move(dir){

    let changed=false;

    switch(dir){

        case "left":
            changed=moveLeft();
            break;

        case "right":
            board=board.map(row=>row.reverse());
            changed=moveLeft();
            board=board.map(row=>row.reverse());
            break;

        case "up":
            board=rotateClockwise(board);
            board=rotateClockwise(board);
            board=rotateClockwise(board);

            changed=moveLeft();

            board=rotateClockwise(board);
            break;

        case "down":
            board=rotateClockwise(board);

            changed=moveLeft();

            board=rotateClockwise(board);
            board=rotateClockwise(board);
            board=rotateClockwise(board);
            break;
    }

    if(changed){
        addRandom();
        render();

        if(isGameOver()){
            document.getElementById("msg").innerText="游戏结束!";
        }
    }
}

function isGameOver(){

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){

            if(board[r][c]===0){
                return false;
            }

            if(c<3 && board[r][c]===board[r][c+1]){
                return false;
            }

            if(r<3 && board[r][c]===board[r+1][c]){
                return false;
            }
        }
    }

    return true;
}

document.addEventListener("keydown",(e)=>{

    switch(e.key){
        case "ArrowLeft":
            move("left");
            break;

        case "ArrowRight":
            move("right");
            break;

        case "ArrowUp":
            move("up");
            break;

        case "ArrowDown":
            move("down");
            break;
    }
});

initGame();

</script>

</body>
</html>
