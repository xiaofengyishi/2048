<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=no">

<title>2048</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:Arial,sans-serif;
    background:#faf8ef;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    touch-action:none;
    overflow:hidden;
}

.container{
    width:95vw;
    max-width:500px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.title{
    font-size:56px;
    font-weight:bold;
    color:#776e65;
}

.score-wrap{
    display:flex;
    gap:10px;
}

.box{
    background:#bbada0;
    color:white;
    padding:10px 16px;
    border-radius:6px;
    text-align:center;
    min-width:90px;
}

.box small{
    display:block;
    font-size:12px;
}

.box span{
    font-size:22px;
    font-weight:bold;
}

.btns{
    margin:12px 0;
}

button{
    border:none;
    background:#8f7a66;
    color:white;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.board{
    background:#bbada0;
    border-radius:10px;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.cell{
    aspect-ratio:1;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    transition:0.15s;
    font-size:clamp(20px,5vw,38px);
}

.msg{
    text-align:center;
    margin-top:15px;
    color:#776e65;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="title">2048-大宇同学</div>

        <div class="score-wrap">

            <div class="box">
                <small>分数</small>
                <span id="score">0</span>
            </div>

            <div class="box">
                <small>最高分</small>
                <span id="best">0</span>
            </div>

        </div>
    </div>

    <div class="btns">
        <button onclick="newGame()">重新开始</button>
    </div>

    <div id="board" class="board"></div>

    <div id="msg" class="msg"></div>

</div>

<script>

const SIZE = 4;

let board = [];
let score = 0;
let best = Number(localStorage.getItem("best2048") || 0);

const colors = {
0:"#cdc1b4",
2:"#eee4da",
4:"#ede0c8",
8:"#f2b179",
16:"#f59563",
32:"#f67c5f",
64:"#f65e3b",
128:"#edcf72",
256:"#edcc61",
512:"#edc850",
1024:"#edc53f",
2048:"#edc22e"
};

function newGame(){

    board = Array(SIZE)
        .fill()
        .map(()=>Array(SIZE).fill(0));

    score = 0;

    document.getElementById("msg").innerText="";

    addRandom();
    addRandom();

    render();
}

function addRandom(){

    const empty=[];

    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){

            if(board[r][c]===0){
                empty.push([r,c]);
            }
        }
    }

    if(!empty.length) return;

    const [r,c] =
        empty[Math.floor(Math.random()*empty.length)];

    board[r][c] =
        Math.random()<0.9 ? 2 : 4;
}

function render(){

    const boardDiv =
        document.getElementById("board");

    boardDiv.innerHTML="";

    board.flat().forEach(value=>{

        const cell =
            document.createElement("div");

        cell.className="cell";

        cell.style.background =
            colors[value] || "#3c3a32";

        cell.style.color =
            value>=8 ? "#fff" : "#776e65";

        cell.innerText =
            value===0 ? "" : value;

        boardDiv.appendChild(cell);
    });

    document.getElementById("score").innerText =
        score;

    document.getElementById("best").innerText =
        best;
}

function slide(row){

    row = row.filter(v=>v);

    for(let i=0;i<row.length-1;i++){

        if(row[i]===row[i+1]){

            row[i]*=2;

            score += row[i];

            if(row[i]===2048){

                document.getElementById("msg")
                .innerText="🎉 达到2048！";
            }

            row[i+1]=0;
        }
    }

    row = row.filter(v=>v);

    while(row.length<SIZE){
        row.push(0);
    }

    return row;
}

function rotate(mat){

    let result =
        Array(SIZE)
        .fill()
        .map(()=>Array(SIZE).fill(0));

    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){

            result[c][SIZE-1-r] =
                mat[r][c];
        }
    }

    return result;
}

function moveLeft(){

    let changed=false;

    for(let r=0;r<SIZE;r++){

        let old=[...board[r]];

        board[r]=slide(board[r]);

        if(old.join()!==board[r].join()){
            changed=true;
        }
    }

    return changed;
}

function move(dir){

    let changed=false;

    switch(dir){

        case "left":
            changed=moveLeft();
            break;

        case "right":
            board=board.map(r=>r.reverse());
            changed=moveLeft();
            board=board.map(r=>r.reverse());
            break;

        case "up":
            board=rotate(rotate(rotate(board)));
            changed=moveLeft();
            board=rotate(board);
            break;

        case "down":
            board=rotate(board);
            changed=moveLeft();
            board=rotate(rotate(rotate(board)));
            break;
    }

    if(changed){

        addRandom();

        if(score>best){

            best=score;

            localStorage.setItem(
                "best2048",
                best
            );
        }

        render();

        if(gameOver()){

            document.getElementById("msg")
            .innerText="😢 游戏结束";
        }
    }
}

function gameOver(){

    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){

            if(board[r][c]===0)
                return false;

            if(
                c<SIZE-1 &&
                board[r][c]===board[r][c+1]
            )
                return false;

            if(
                r<SIZE-1 &&
                board[r][c]===board[r+1][c]
            )
                return false;
        }
    }

    return true;
}

/* 键盘 */

document.addEventListener(
"keydown",
e=>{

    if(e.key==="ArrowLeft")
        move("left");

    if(e.key==="ArrowRight")
        move("right");

    if(e.key==="ArrowUp")
        move("up");

    if(e.key==="ArrowDown")
        move("down");
});

/* 手机滑动 */

let startX=0;
let startY=0;

document.addEventListener(
"touchstart",
e=>{

    startX =
        e.touches[0].clientX;

    startY =
        e.touches[0].clientY;

},{passive:true});

document.addEventListener(
"touchend",
e=>{

    let endX =
        e.changedTouches[0].clientX;

    let endY =
        e.changedTouches[0].clientY;

    let dx=endX-startX;
    let dy=endY-startY;

    const limit=30;

    if(
        Math.abs(dx)>
        Math.abs(dy)
    ){

        if(Math.abs(dx)<limit)
            return;

        if(dx>0)
            move("right");
        else
            move("left");
    }
    else{

        if(Math.abs(dy)<limit)
            return;

        if(dy>0)
            move("down");
        else
            move("up");
    }

},{passive:true});

newGame();

</script>

</body>
</html>
